<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Ruleta Concurso</title>

    <style>
        body{
            margin:0;
            background:#e8f5e9;
            overflow:hidden;
            font-family:system-ui,Segoe UI,Roboto;
            color:white;
        }

        #wrapper{
            width:100vw;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        canvas{
            width:60vmin;
            height:60vmin;
            border-radius:50%;
            box-shadow:0 20px 80px rgba(0,0,0,.8);
            margin-top:-2rem;
        }

        /* Flecha dividida en palo y punta para animar la punta */
        .pointer {
            position: absolute;
            top: 29%;
            left: 49.4%;
            transform: translate(-50%, -100%);
            width: 10px;
            height: 100px;
            z-index: 5;
            pointer-events: none;
        }

        .tip {
            width: 0;
            height: 0;
            margin: 0 auto;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid #ffeb3b;
            transform-origin: 50% 0;
            transition: transform 0.08s ease-out;
        }

        #controls{
            position:absolute;
            bottom:20px;
            text-align:center;
        }

        button{
            padding:14px 25px;
            font-size:18px;
            font-weight:800;
            border-radius:10px;
            border:none;
            cursor:pointer;
            margin:10px;
        }

        #spin{background:white;color:black;}

        #players {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player{
            padding: 10px 18px;
            border-radius: 10px;
            background: #222;
            font-weight: 700;
        }

        .active{
            background:#ff9800;
            color:black;
        }

        /* Flechas para cambiar jugador */
        .arrow {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            width: auto;
            height: auto;
            padding: 0 8px;
            cursor: pointer;
            user-select: none;
            box-shadow: none;
        }

        .arrow:hover {
            color: #ff9800;
            background: none;
        }


        #result{
            position:absolute;
            /* top will be set dynamically to sit between wheel and controls */
            left:50%;
            transform:translateX(-50%);
            font-size:24px;
            font-weight:900;
            border: 3px solid #2e7d32;
            padding: 10px 20px;
            border-radius: 8px;
            background: #2e7d32;
            color: white;
            z-index: 50;
        }

        /* Estils pel rellotge digital */
        #rellotge-container {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            border: 3px solid #2e7d32;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .rellotge-display-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rellotge-unit {
            display: flex;
            align-items: center;
            gap: 5px;
            position: relative;
        }

        .rellotge-value {
            font-size: 48px;
            font-weight: 700;
            color: #2e7d32;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            min-width: 60px;
            text-align: center;
        }

        .rellotge-separator {
            font-size: 48px;
            font-weight: 700;
            color: #2e7d32;
            font-family: 'Courier New', monospace;
        }

        .rellotge-controls {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .rellotge-btn {
            width: 28px;
            height: 24px;
            border: 2px solid #2e7d32;
            border-radius: 4px;
            background: white;
            color: #2e7d32;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .rellotge-btn:hover {
            background: #2e7d32;
            color: white;
        }

        .rellotge-label {
            font-size: 10px;
            color: #555;
            font-weight: 600;
            text-align: center;
            margin-top: 2px;
        }

        .rellotge-accio {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .rellotge-accio button {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid #2e7d32;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btn-iniciar {
            background: #2e7d32;
            color: white;
        }

        #btn-iniciar:hover {
            background: #1b5e20;
        }

        #btn-parar {
            background: #c62828;
            color: white;
            border-color: #c62828;
        }

        #btn-parar:hover {
            background: #8b1919;
        }

        #btn-reset {
            background: #ff9800;
            color: white;
            border-color: #ff9800;
        }

        #btn-reset:hover {
            background: #f57c00;
        }
    </style>
</head>

<body>
<div id="wrapper">
    <!-- Rellotge digital -->
    <div id="rellotge-container">
        <div class="rellotge-display-container">
            <div class="rellotge-unit">
                <div class="rellotge-controls">
                    <button class="rellotge-btn" onclick="pujarMinut()">▲</button>
                    <button class="rellotge-btn" onclick="baixarMinut()">▼</button>
                </div>
                <div class="rellotge-value" id="rellotge-minuts">00</div>
            </div>
            <div class="rellotge-separator">:</div>
            <div class="rellotge-unit">
                <div class="rellotge-value" id="rellotge-segons">15</div>
                <div class="rellotge-controls">
                    <button class="rellotge-btn" onclick="pujarSegon()">▲</button>
                    <button class="rellotge-btn" onclick="baixarSegon()">▼</button>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 5px;">
            <div class="rellotge-label">MIN</div>
            <div style="width: 60px;"></div>
            <div class="rellotge-label">SEG</div>
        </div>
        <div class="rellotge-accio">
            <button id="btn-iniciar" onclick="iniciarCompteEnrere()">Iniciar</button>
            <button id="btn-parar" onclick="pararCompteEnrere()">Parar</button>
            <button id="btn-reset" onclick="resetRellotge()">Reset</button>
        </div>
    </div>

    <div class="pointer">
        <div class="shaft"></div>
        <div class="tip"></div>
    </div>
    <canvas id="wheel" width="1000" height="1000"></canvas>

    <div id="players">
        <button id="leftArrow" class="arrow">◀</button>
        <!-- Los jugadores se añadirán aquí dinámicamente -->
        <button id="rightArrow" class="arrow">▶</button>
    </div>

    <div id="result">Pulsa GIRAR</div>

    <!-- Overlay para recordar añadir equipos y bloquear juego si no hay equipos -->
    <div id="overlay-ruleta" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:3000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:12px; max-width:90%; text-align:center; color:#2e7d32; font-weight:700;">
            <div id="overlay-ruleta-text">Recorda: Has d'afegir equips abans de jugar.</div>
            <div style="margin-top:18px; display:flex; gap:10px; justify-content:center;">
                <button onclick="window.location.href='Clasificacion.html'" style="background:#2e7d32; color:white; padding:10px 16px; border-radius:8px; border:none;">Anar a Classificació</button>
                <button onclick="cerrarOverlayRuleta(); refreshPlayersFromStorage();" style="background:#ccc; color:#111; padding:10px 16px; border-radius:8px; border:none;">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="spin">GIRAR</button>
    </div>

    <script>
        // ======================
        // SEGMENTOS (20)
        // ======================
        // Define a base of 10 segments and duplicate it so the opposite segment (index +10)
        // is the same value (and color). This guarantees symmetry across the wheel.
        const baseSegments = [
            "150",             // 0
            "50",              // 1 - abans Pierdes turno
            "100",             // 2
            "Pierdes turno",   // 3
            "200",             // 4
            "50",              // 5
            "Quiebra",         // 6
            "100",             // 7
            "500",             // 8
            "Pierdes turno"    // 9 - abans 50
        ];
        const segments = baseSegments.concat(baseSegments.slice());

        // Colors: use a base palette for the 10-segment pattern and duplicate it
        const baseColors = [
            "#9C27B0", // 150 - purple
            "#F3D23A", // 50 - yellow
            "#2DBE6C", // 100 - green
            "#D43B3B", // Pierdes turno - red
            "#FF9800", // 200 - orange
            "#F3D23A", // 50 - yellow
            "#000000", // Quiebra - black
            "#2DBE6C", // 100 - green
            "#FF9800", // 500 - orange
            "#D43B3B"  // Pierdes turno - red
        ];
        const colors = baseColors.concat(baseColors.slice());

        // ======================
        // JUGADORES (cargados desde localStorage 'equips')
        // ======================
        // Cada equipo en Clasificacion.html se guarda en localStorage bajo la clave 'equips'
        // con la forma: {nom, punts, paraulesResoltes, paraules}
        let players = [];
        let currentPlayer = 0;

        function loadPlayersFromStorage(){
            const storedEquips = JSON.parse(localStorage.getItem('equips')) || [];
            players = storedEquips.map(e => ({
                name: e.nom || 'Equip',
                score: e.punts || 0,
                paraules: e.paraules || [],
                paraulesResoltes: e.paraulesResoltes || 0
            }));
        }
        
        loadPlayersFromStorage();

        function persistPlayers(){
            // Actualiza los punts en localStorage para que los cambios de puntuación persistan
            // Utilitzem l'índex per sincronitzar, ja que l'ordre es manté
            const stored = JSON.parse(localStorage.getItem('equips')) || [];
            
            // Sincronitzar per índex i per nom com a fallback
            players.forEach((p, i) => {
                // Primer intentar per índex
                if (stored[i]) {
                    stored[i].punts = p.score;
                } else {
                    // Fallback: buscar per nom
                    const idx = stored.findIndex(s => s.nom === p.name);
                    if(idx >= 0){
                        stored[idx].punts = p.score;
                    }
                }
            });
            localStorage.setItem('equips', JSON.stringify(stored));
        }

        // ======================
        // SONIDOS
        // ======================
        const spinSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-wheel-bleep-1908.mp3");
        const clickSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-click-melodic-tone-1129.mp3");
        const goodResultSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");
        const badResultSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-retro-arcade-lose-203.mp3");

        // Pre-carregar sons
        spinSound.preload = 'auto';
        clickSound.preload = 'auto';
        goodResultSound.preload = 'auto';
        badResultSound.preload = 'auto';

        // Funció per reproduir sons amb maneig d'errors
        function playSound(sound) {
            sound.currentTime = 0;
            sound.play().catch(e => console.log('So bloquejat pel navegador:', e));
        }

        // ======================
        // RELLLOTGE
        // ======================
        let minutsRellotge = 0;
        let segonsRellotge = 15;
        let intervalRellotge = null;
        let comptant = false;

        const alarmSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3");
        alarmSound.preload = 'auto';

        function actualitzarDisplayRellotge() {
            const min = String(minutsRellotge).padStart(2, '0');
            const seg = String(segonsRellotge).padStart(2, '0');
            document.getElementById('rellotge-minuts').textContent = min;
            document.getElementById('rellotge-segons').textContent = seg;
        }

        function pujarMinut() {
            if (comptant) return;
            minutsRellotge = Math.min(minutsRellotge + 1, 99);
            actualitzarDisplayRellotge();
        }

        function baixarMinut() {
            if (comptant) return;
            minutsRellotge = Math.max(minutsRellotge - 1, 0);
            actualitzarDisplayRellotge();
        }

        function pujarSegon() {
            if (comptant) return;
            segonsRellotge = Math.min(segonsRellotge + 1, 59);
            actualitzarDisplayRellotge();
        }

        function baixarSegon() {
            if (comptant) return;
            segonsRellotge = Math.max(segonsRellotge - 1, 0);
            actualitzarDisplayRellotge();
        }

        function iniciarCompteEnrere() {
            if (comptant) return;
            comptant = true;

            intervalRellotge = setInterval(() => {
                if (segonsRellotge > 0) {
                    segonsRellotge--;
                } else if (minutsRellotge > 0) {
                    minutsRellotge--;
                    segonsRellotge = 59;
                } else {
                    pararCompteEnrere();
                    playSound(alarmSound);
                }
                actualitzarDisplayRellotge();
            }, 1000);
        }

        function pararCompteEnrere() {
            if (!comptant) return;
            comptant = false;
            if (intervalRellotge) {
                clearInterval(intervalRellotge);
                intervalRellotge = null;
            }
        }

        function resetRellotge() {
            pararCompteEnrere();
            minutsRellotge = 0;
            segonsRellotge = 15;
            actualitzarDisplayRellotge();
        }

        actualitzarDisplayRellotge();

        // ======================
        // CANVAS
        // ======================
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const size = canvas.width;
        const center = size/2;
        const radius = center - 20;

        let currentAngle = 0;
        let spinning = false;

        function drawWheel(angle){
            ctx.clearRect(0,0,size,size);
            const slice = (Math.PI*2)/segments.length;

            ctx.save();
            ctx.translate(center,center);
            ctx.rotate(angle);

            for(let i=0;i<segments.length;i++){
                const start=i*slice;
                const end=start+slice;

                ctx.beginPath();
                ctx.moveTo(0,0);
                ctx.arc(0,0,radius,start,end);
                ctx.closePath();
                ctx.fillStyle=colors[i];
                ctx.fill();
                ctx.strokeStyle="#fff3";
                ctx.lineWidth=3;
                ctx.stroke();

                ctx.save();
                ctx.rotate(start+slice/2);
                ctx.fillStyle="white";
                ctx.font="bold 30px Arial";
                ctx.textAlign="right";
                ctx.fillText(segments[i],radius-30,10);
                ctx.restore();
            }

            ctx.restore();
        }

        // Actualiza el listado de jugadores con los estilos y botones flecha
        function updatePlayers(){
            const container=document.getElementById("players");
            // Guardar botones flecha
            const leftArrow = document.getElementById("leftArrow");
            const rightArrow = document.getElementById("rightArrow");
            container.innerHTML = "";
            container.appendChild(leftArrow);

            players.forEach((p,i)=>{
                const div=document.createElement("div");
                div.className="player"+(i===currentPlayer?" active":"");
                div.innerText=p.name+" : "+p.score+" pts";
                container.appendChild(div);
            });

            container.appendChild(rightArrow);
        }

        function nextPlayer(){
            currentPlayer=(currentPlayer+1)%players.length;
            updatePlayers();
        }

        function easeOut(t){return 1-Math.pow(1-t,3);}

        // Variable para controlar último segmento que pasó la flecha
        let lastSegmentPassed = -1;

        // Rebote rápido de la punta
        function animateTip(){
            const tip = document.querySelector('.pointer .tip');
            tip.style.transform = "rotate(-20deg)";
            setTimeout(() => {
                tip.style.transform = "rotate(0deg)";
            }, 80);
        }

        function spin(){
            if(spinning) return;
            spinning = true;

            playSound(spinSound);
            // Clear interim result so only the final cell value is shown when spin ends
            document.getElementById("result").innerText = "";

            const slice=(Math.PI*2)/segments.length;
            // Choose random segment where the wheel will stop
            const winner=Math.floor(Math.random()*segments.length);

            // La flecha está en -PI/2 (arriba, apuntando hacia arriba)
            // Para que el segmento 'winner' quede bajo la flecha, necesitamos calcular el ángulo final
            // El centro del segmento winner está en: winner * slice + slice/2
            // Giramos en sentido horario (ángulo negativo) para que la rueda gire siempre igual

            const sliceCenter = winner * slice + slice/2;
            // Target angle: make the winner segment align with the arrow at -PI/2
            const targetAngle = -Math.PI/2 - sliceCenter;

            const startAngle = currentAngle % (Math.PI * 2);
            // Always spin counterclockwise (to the right) with same speed: 5 full rotations + distance to target
            // We ensure we always rotate positively (counterclockwise) by going at least 5 full turns
            const fullRotations = 5 * Math.PI * 2;

            // Calculate the counterclockwise distance to target
            let rotationNeeded = targetAngle - startAngle;
            // Normalize to ensure we always go counterclockwise (positive direction)
            while (rotationNeeded <= 0) {
                rotationNeeded += Math.PI * 2;
            }

            const endAngle = startAngle + rotationNeeded + fullRotations;

            const duration=4000; // Fixed duration for consistent speed
            const startTime=performance.now();

            lastSegmentPassed = -1;

            function animate(now){
                const t=Math.min(1,(now-startTime)/duration);
                const eased=easeOut(t);
                currentAngle=startAngle+(endAngle-startAngle)*eased;
                drawWheel(currentAngle);

                // Detectar qué segmento está delante de la flecha (flecha apunta hacia arriba, es -PI/2)
                let normalizedAngle = (-Math.PI/2 - currentAngle) % (Math.PI*2);
                if(normalizedAngle < 0) normalizedAngle += Math.PI*2;

                const currentSegment = Math.floor(normalizedAngle / slice) % segments.length;

                if(currentSegment !== lastSegmentPassed){
                    lastSegmentPassed = currentSegment;
                    animateTip();
                }

                if(t<1){
                    requestAnimationFrame(animate);
                }else{
                    spinning=false;
                    playSound(clickSound);
                    const prize=segments[winner];
                    handleResult(prize);
                    positionResult();
                }
            }

            requestAnimationFrame(animate);
        }

        function handleResult(prize){
            // Apply game effects and display the result.
            if(prize==="Quiebra"){
                players[currentPlayer].score=0;
                persistPlayers();
                sessionStorage.setItem('equipSeleccionat', currentPlayer.toString());
                nextPlayer();
                // So dolent - perdre punts
                playSound(badResultSound);
            }
            else if(prize==="Pierdes turno"){
                sessionStorage.setItem('equipSeleccionat', currentPlayer.toString());
                nextPlayer();
                // So dolent - perdre torn
                playSound(badResultSound);
            }
            else if(/^\d+$/.test(prize)){
                // Numeric prize: sumar punts directament a l'equip actual
                const points = parseInt(prize);
                players[currentPlayer].score += points;
                persistPlayers();
                sessionStorage.setItem('equipSeleccionat', currentPlayer.toString());
                // So bo - guanyar punts
                playSound(goodResultSound);
                // El jugador manté el torn (no es crida nextPlayer())
            }

            // Save updated scores to localStorage so Game.html can access them
            persistPlayers();

            // Format display: numbers with + prefix, other labels as-is
            const numeric = /^\d+$/.test(prize);
            const display = numeric ? ('+' + prize) : prize;

            document.getElementById("result").innerText = display;
            updatePlayers();
            // reposition in case result size changed
            positionResult();
        }

        // Cambiar jugador actual a la izquierda
        document.getElementById("leftArrow").addEventListener("click", () => {
            currentPlayer = (currentPlayer - 1 + players.length) % players.length;
            updatePlayers();
        });

        // Cambiar jugador actual a la derecha
        document.getElementById("rightArrow").addEventListener("click", () => {
            currentPlayer = (currentPlayer + 1) % players.length;
            updatePlayers();
        });

        // If there are no players, disable spin and show overlay
        function hasPlayers(){ return players && players.length > 0; }

        function setupSpinButton(){
            const spinBtn = document.getElementById("spin");
            spinBtn.removeEventListener("click", spin);
            if(hasPlayers()){
                spinBtn.disabled = false;
                spinBtn.addEventListener("click", spin);
            } else {
                spinBtn.disabled = true;
            }
        }
        
        setupSpinButton();

        // Position the result element dynamically
        function positionResult(){
            const wheel = document.getElementById('wheel');
            const controls = document.getElementById('controls');
            const result = document.getElementById('result');
            if(!wheel || !controls || !result) return;

            // Get bounding rects relative to viewport
            const wheelRect = wheel.getBoundingClientRect();
            const controlsRect = controls.getBoundingClientRect();

            // Desired top: a few pixels below wheel bottom but above controls top
            const margin = 8; // px
            let desiredTop = wheelRect.bottom + margin;

            // If desiredTop would overlap controls, clamp it to stay above controls by margin
            const maxTop = controlsRect.top - result.offsetHeight - margin;
            if(desiredTop > maxTop) desiredTop = Math.max(wheelRect.bottom + margin, controlsRect.top - result.offsetHeight - margin);

            // Convert viewport Y to position relative to wrapper (which is positioned)
            const wrapper = document.getElementById('wrapper');
            const wrapperRect = wrapper.getBoundingClientRect();
            const topRelative = desiredTop - wrapperRect.top;

            result.style.top = topRelative + 'px';
        }

        drawWheel(currentAngle);
        updatePlayers();
        // initial positioning
        positionResult();

        // re-position on resize and after animations
        window.addEventListener('resize', positionResult);

        // If there are no players, show overlay
        if(!hasPlayers()){
            // If navigation requested a reminder for ruleta, clean the flag
            if(sessionStorage.getItem('mostrarRecordatorioRuleta') === 'true'){
                sessionStorage.removeItem('mostrarRecordatorioRuleta');
            }
            // Block and show overlay
            document.getElementById('overlay-ruleta').style.display = 'flex';
        } else {
            // If there are players but navigation requested a reminder, just clean the flag
            if(sessionStorage.getItem('mostrarRecordatorioRuleta') === 'true'){
                sessionStorage.removeItem('mostrarRecordatorioRuleta');
            }
        }

        function cerrarOverlayRuleta(){
            document.getElementById('overlay-ruleta').style.display = 'none';
        }
        
        // Funció per recarregar jugadors des de storage (per si s'han afegit equips nous)
        function refreshPlayersFromStorage(){
            loadPlayersFromStorage();
            updatePlayers();
            setupSpinButton();
        }
    </script>
    <script src="menu.js"></script>
</div>
</body>
</html>
