<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>La Ruleta de la Sostenibilitat - Joc</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e8f5e9; text-align: center; margin:0; padding:0;}
        .panel {
            display: flex; flex-wrap: wrap; justify-content: center; max-width: 800px;
            margin: 50px auto; background: #2e7d32; padding: 20px;
            border: 8px solid #1b5e20; border-radius: 10px;
        }
        .letter-box {
            width: 40px; height: 50px; border: 2px solid #000; margin: 5px;
            background: white; display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; text-transform: uppercase;
            color: transparent; /* letra oculta */
            user-select: none; transition: color 0.3s ease;
        }
        .hidden {
            background: #388e3c; border-color: #1b5e20; cursor: default; color: transparent;
        }
        .visible {
            color: black;
        }
        .space { background: transparent; border: none; width: 20px; }

        .controls { margin-top: 30px; }
        input {
            padding: 10px; font-size: 18px; width: 50px; text-align: center; text-transform: uppercase;
        }
        button {
            padding: 10px 20px; font-size: 18px; cursor: pointer;
            background: #2e7d32; color: white; border: none; border-radius: 5px;
            transition: background-color 0.3s ease;
            margin-left: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        #puntuacio {
            font-size: 24px; color: #1b5e20; margin-bottom: 20px;
        }
        
        #selector-equip {
            font-size: 18px;
            padding: 8px 15px;
            border: 2px solid #2e7d32;
            border-radius: 8px;
            background: white;
            color: #2e7d32;
            font-weight: 700;
            cursor: pointer;
            min-width: 200px;
        }
        
        #selector-equip:focus {
            outline: none;
            border-color: #1b5e20;
        }
        
        #punts-equip {
            font-size: 18px;
            color: #1b5e20;
            margin-left: 15px;
            font-weight: 600;
        }

        /* Fondo oscuro y mensaje central */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 2000;
        }
        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #mensaje-acertado, #mensaje-fallado {
            background: white;
            border-radius: 15px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 0 20px #4caf50cc;
            max-width: 90%;
            color: #2e7d32;
            font-size: 2rem;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #overlay.acertado #mensaje-acertado,
        #overlay.fallado #mensaje-fallado {
            opacity: 1;
            transform: scale(1);
        }
        #mensaje-acertado button,
        #mensaje-fallado button {
            margin-top: 30px;
            background: #2e7d32;
            color: white;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
        #mensaje-acertado button:hover,
        #mensaje-fallado button:hover {
            background: #1b5e20;
        }
        #mensaje-fallado {
            background: #c62828;
            color: white;
            box-shadow: 0 0 20px #b71c1ccc;
        }
        #mensaje-fallado #correcta-text {
            font-size: 1rem;
            font-weight: normal;
            margin-top: 15px;
            color: #ffcccc;
        }

        /* Menú hamburguesa */
        .nav-menu {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10001;
        }
        .hamburger-btn {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 40px;
            height: 30px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        .hamburger-btn span {
            width: 100%;
            height: 3px;
            background: #2e7d32;
            border-radius: 2px;
            display: block;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background: white;
            border: 2px solid black;
            border-radius: 8px;
            min-width: 220px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 10000;
        }
        .dropdown-menu.active {
            display: block;
        }
        .dropdown-menu a {
            display: block;
            padding: 12px 15px;
            color: #2e7d32;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid black;
            transition: background-color 0.3s ease;
        }
        .dropdown-menu a:last-child {
            border-bottom: none;
        }
        .dropdown-menu a:hover {
            background-color: #e8f5e9;
        }

        /* Animación de vibración */
        @keyframes vibrar {
            0%, 100% { transform: translateX(0); }
            10% { transform: translateX(-5px); }
            20% { transform: translateX(5px); }
            30% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            60% { transform: translateX(5px); }
            70% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
            90% { transform: translateX(-5px); }
        }

        #input-letra.error {
            background-color: #c62828;
            color: white;
            animation: vibrar 1s;
        }

        /* Mensaje de error temporal */
        #mensaje-error-letra {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 12px;
            background: #c62828;
            color: white;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            margin-bottom: 5px;
        }

        #mensaje-error-letra.mostrar {
            opacity: 1;
        }

        /* Mensaje de error para frase */
        #mensaje-error-frase {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 10px;
            padding: 8px 12px;
            background: #c62828;
            color: white;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 100;
        }

        #mensaje-error-frase.mostrar {
            opacity: 1;
        }

        #panel-joc-container {
            position: relative;
            display: inline-block;
        }

        /* Linea input frase nueva */
        #input-frase {
            width: 300px;
            max-width: 90vw;
            text-transform: uppercase;
            font-size: 18px;
            padding: 10px;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        #input-frase.error {
            background-color: #c62828;
            color: white;
            animation: vibrar 1s;
        }
        #btn-intentar-frase {
            margin-left: 10px;
        }

        /* Estils per la pista */
        #pista-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 15px 20px;
            background: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 10px;
            display: none;
        }

        #pista-container.visible {
            display: block;
        }

        #pista-text {
            color: #e65100;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
        }

        #btn-pista {
            background: #ff9800;
            color: white;
        }

        #btn-pista:hover {
            background: #f57c00;
        }

        #btn-pista:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Overlay per recordar que cal afegir equips abans de jugar */
        #overlay-recordatorio-equip {
            display:none;
            position:fixed;
            top:0; left:0; width:100vw; height:100vh;
            background:rgba(0,0,0,0.6);
            z-index:5000;
            justify-content:center;
            align-items:center;
        }
        #overlay-recordatorio-equip.actiu {
            display:flex;
        }
    </style>
</head>
<body>

<!-- Overlay per recordar que cal afegir equips abans de jugar -->
<div id="overlay-recordatorio-equip">
    <div style="background:white; padding:30px; border-radius:12px; max-width:90%; text-align:center; color:#2e7d32; font-weight:700;">
        <div style="font-size:1.2rem; margin-bottom:10px;">⚠️ Recordatori</div>
        <div>Has d'afegir almenys 1 equip abans de poder jugar.</div>
        <div style="margin-top:18px;">
            <button onclick="window.location.href='Clasificacion.html'" style="background:#2e7d32; color:white; padding:10px 16px; border-radius:8px; border:none; font-size:16px; cursor:pointer;">Anar a Classificació</button>
            <button onclick="document.getElementById('overlay-recordatorio-equip').classList.remove('actiu');" style="background:#ccc; color:#111; padding:10px 16px; border-radius:8px; border:none; font-size:16px; cursor:pointer; margin-left:8px;">Cancel·lar</button>
        </div>
    </div>
</div>

<div class="nav-menu">
    <button class="hamburger-btn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="dropdown-menu" id="dropdownMenu">
        <a href="index.html">PÀGINA PRINCIPAL</a>
        <a href="#" onclick="irAPalabrasDesdeMenu(event)">PARAULES</a>
        <a href="#" onclick="irAGameDesdeMenu(event)">JOC (Última paraula)</a>
        <a href="#" onclick="irARuletaDesdeMenu(event)">RULETA</a>
        <a href="Clasificacion.html">CLASSIFICACIÓ</a>
        <a href="Normas.html">NORMES</a>
    </div>
</div>

<h1>🌿 La Ruleta de la Sostenibilitat</h1>
<div id="puntuacio">
    <label for="selector-equip">Equip: </label>
    <select id="selector-equip"></select>
    <span id="punts-equip"></span>
</div>

<div id="panel-joc-container">
    <div class="panel" id="panel-joc"></div>
</div>

<!-- Contenedor per la pista -->
<div id="pista-container">
    <div id="pista-text"></div>
</div>

<div class="controls">
    <div style="margin-bottom: 10px; position: relative; display: flex; justify-content: center; align-items: center; gap: 10px;">
        <div id="mensaje-error-letra"></div>
        <input type="text" id="input-letra" maxlength="1" placeholder="?" autofocus autocomplete="off">
        <button onclick="comprovarLetra()">Intentar Lletra (Cost: 50)</button>
    </div>
    <div style="position: relative; margin-bottom: 55px;">
        <input type="text" id="input-frase" placeholder="Introdueix la frase o paraula" autocomplete="off">
        <button id="btn-intentar-frase" onclick="intentarFrase()">Intentar Frase (Cost: 200)</button>
        <div id="mensaje-error-frase"></div>
    </div>
    <div style="text-align: center;">
        <button onclick="resoldre()">Resoldre!</button>
        <button id="btn-pista" onclick="mostrarPista()">Pista (Cost: 100)</button>
    </div>
</div>

<!-- Overlay con mensaje para acertar o fallar -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="mensaje-texto">
    <div id="mensaje-acertado">
        <div id="mensaje-texto">¡Has acertado!</div>
        <button onclick="window.location.href='index.html'">🏠 Pàgina principal</button>
    </div>
    <div id="mensaje-fallado" style="display:none;">
        <div id="mensaje-texto-fallado">¡Has fallado!</div>
        <div id="correcta-text"></div>
        <button onclick="window.location.href='index.html'">🏠 Pàgina principal</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
    // Sons del joc
    const correctLetterSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-531.mp3");
    const wrongLetterSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3");
    const correctWordSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");
    const wrongWordSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-retro-arcade-lose-203.mp3");

    // Pre-carregar sons
    correctLetterSound.preload = 'auto';
    wrongLetterSound.preload = 'auto';
    correctWordSound.preload = 'auto';
    wrongWordSound.preload = 'auto';

    // Funció per reproduir sons amb maneig d'errors
    function playSound(sound) {
        sound.currentTime = 0;
        sound.play().catch(e => console.log('So bloquejat pel navegador:', e));
    }

    // Recuperamos frase del sessionStorage o defecto
    let fraseLogica = sessionStorage.getItem('ultimaFrase')?.toUpperCase() || 'FILTRE NEGATIU';
    let pista = sessionStorage.getItem('ultimaPista') || '';
    let pistaMostrada = false; // Per evitar mostrar la pista més d'una vegada

    // Clau única per guardar l'estat del joc per a cada frase
    const jocKey = 'joc_' + fraseLogica.replace(/\s+/g, '_');

    // Carregar lletres revelades guardades (si n'hi ha)
    let lletresRevelades = JSON.parse(sessionStorage.getItem(jocKey)) || [];

    // Carregar equips des de localStorage
    let equips = JSON.parse(localStorage.getItem('equips')) || [];
    let equipSeleccionat = 0; // Índix de l'equip seleccionat

    const selectorEquip = document.getElementById('selector-equip');
    const puntsEquipSpan = document.getElementById('punts-equip');

    // Funció per actualitzar el selector d'equips
    function actualitzarSelectorEquips() {
        equips = JSON.parse(localStorage.getItem('equips')) || [];
        selectorEquip.innerHTML = '';
        
        if (equips.length === 0) {
            selectorEquip.innerHTML = '<option value="">Cap equip</option>';
            puntsEquipSpan.textContent = '';
            return;
        }
        
        equips.forEach((equip, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = equip.nom;
            selectorEquip.appendChild(option);
        });
        
        // Seleccionar el primer equip per defecte
        if (equipSeleccionat >= equips.length) {
            equipSeleccionat = 0;
        }
        selectorEquip.value = equipSeleccionat;
        actualitzarPuntsVisibles();
    }

    // Funció per actualitzar els punts visibles
    function actualitzarPuntsVisibles() {
        if (equips.length > 0) {
            puntsEquipSpan.textContent = equips[equipSeleccionat].punts + ' punts';
        }
    }

    // Funció per obtenir els punts de l'equip seleccionat
    function obtenirPunts() {
        if (equips.length === 0) return 0;
        return equips[equipSeleccionat].punts || 0;
    }

    // Funció per establir els punts de l'equip seleccionat
    function establirPunts(nousPunts) {
        if (equips.length === 0) return;
        equips[equipSeleccionat].punts = nousPunts;
        localStorage.setItem('equips', JSON.stringify(equips));
        actualitzarPuntsVisibles();
    }

    // Event listener per quan es canvia d'equip
    selectorEquip.addEventListener('change', function() {
        equipSeleccionat = parseInt(this.value);
        actualitzarPuntsVisibles();
    });

    // Actualitzar punts quan es modifiqui localStorage (des de la ruleta)
    window.addEventListener('storage', function(e) {
        if (e.key === 'equips') {
            equips = JSON.parse(localStorage.getItem('equips')) || [];
            actualitzarPuntsVisibles();
        }
    });

    // Actualitzar punts quan es torna a la pestanya o es navega des de ruleta
    window.addEventListener('focus', function() {
        equips = JSON.parse(localStorage.getItem('equips')) || [];
        actualitzarSelectorEquips();
    });

    // Inicialitzar el selector d'equips
    actualitzarSelectorEquips();

    const panel = document.getElementById('panel-joc');
    panel.innerHTML = '';

    function crearPanel() {
        panel.innerHTML = '';
        for (let char of fraseLogica) {
            const div = document.createElement('div');
            if (char === " ") {
                div.className = "letter-box space";
            } else {
                div.className = "letter-box hidden";
                div.dataset.lletra = char;
                div.innerText = "";
                
                // Si la lletra ja estava revelada, la mostrem
                if (lletresRevelades.includes(char)) {
                    div.classList.remove('hidden');
                    div.classList.add('visible');
                    div.innerText = char;
                }
            }
            panel.appendChild(div);
        }
    }

    crearPanel();

    function comprovarLetra() {
        const input = document.getElementById('input-letra');
        const lletra = input.value.toUpperCase();

        if (!lletra || !/^[A-ZÇÀÈÉÍÏÒÓÚÜ]$/.test(lletra)) {
            mostrarErrorTemporal("Introduïu una lletra vàlida!");
            input.value = "";
            return;
        }

        const puntsActuals = obtenirPunts();
        if (puntsActuals < 50) {
            mostrarErrorTemporal("No tens prou punts! (Cost: 50)");
            input.value = "";
            return;
        }

        // Restar 50 punts
        establirPunts(puntsActuals - 50);

        const caselles = document.querySelectorAll('.letter-box');
        let found = false;
        caselles.forEach(c => {
            if (c.dataset.lletra === lletra) {
                c.classList.remove('hidden');
                c.classList.add('visible');
                c.innerText = lletra;
                found = true;
                
                // Guardar la lletra revelada
                if (!lletresRevelades.includes(lletra)) {
                    lletresRevelades.push(lletra);
                    sessionStorage.setItem(jocKey, JSON.stringify(lletresRevelades));
                }
            }
        });

        if (!found) {
            mostrarErrorTemporal("La lletra no està a la frase.");
            // So de lletra fallada
            playSound(wrongLetterSound);
        } else {
            // So de lletra encertada
            playSound(correctLetterSound);
        }

        input.value = "";
        input.focus();

        if (comprovarGuanyat()) {
            mostrarMissatgeAcertat();
        }
    }

    function mostrarErrorTemporal(mensaje) {
        const input = document.getElementById('input-letra');
        const mensajeDiv = document.getElementById('mensaje-error-letra');
        
        // Añadir clase de error al input
        input.classList.add('error');
        
        // Mostrar el mensaje
        mensajeDiv.textContent = mensaje;
        mensajeDiv.classList.add('mostrar');
        
        // Remover después de 1 segundo
        setTimeout(() => {
            input.classList.remove('error');
            mensajeDiv.classList.remove('mostrar');
        }, 1000);
    }

    function mostrarErrorTemporalFrase(mensaje) {
        const inputFrase = document.getElementById('input-frase');
        const mensajeDiv = document.getElementById('mensaje-error-frase');
        
        // Añadir clase de error al input
        inputFrase.classList.add('error');
        
        // Mostrar el mensaje
        mensajeDiv.textContent = mensaje;
        mensajeDiv.classList.add('mostrar');
        
        // Remover después de 1 segundo
        setTimeout(() => {
            inputFrase.classList.remove('error');
            mensajeDiv.classList.remove('mostrar');
        }, 1000);
    }

    // Funció per guardar la paraula a l'equip seleccionat
    function guardarParaulaPerEquip() {
        if (equips.length === 0) return;
        
        // Actualitzar la llista d'equips des de localStorage
        const equipsActualitzats = JSON.parse(localStorage.getItem('equips')) || [];
        
        // Trobar l'equip seleccionat
        const equipIndex = equipsActualitzats.findIndex(e => e.nom === equips[equipSeleccionat].nom);
        
        if (equipIndex >= 0) {
            // Afegir la paraula si no hi és ja
            if (!equipsActualitzats[equipIndex].paraules) {
                equipsActualitzats[equipIndex].paraules = [];
            }
            if (!equipsActualitzats[equipIndex].paraules.includes(fraseLogica)) {
                equipsActualitzats[equipIndex].paraules.push(fraseLogica);
                equipsActualitzats[equipIndex].paraulesResoltes = equipsActualitzats[equipIndex].paraules.length;
            }
            localStorage.setItem('equips', JSON.stringify(equipsActualitzats));
            
            // Actualitzar la referència local
            equips[equipSeleccionat].paraules = equipsActualitzats[equipIndex].paraules;
            equips[equipSeleccionat].paraulesResoltes = equipsActualitzats[equipIndex].paraulesResoltes;
        }
    }

    function resoldre() {
        // Resoldre no costa punts
        guardarParaulaPerEquip();
        revelarFrase();
        mostrarMissatgeAcertat();
    }

    function comprovarGuanyat() {
        const caselles = document.querySelectorAll('.letter-box');
        for (let c of caselles) {
            if (c.dataset.lletra && c.classList.contains('hidden')) {
                return false;
            }
        }
        // Totes les lletres revelades - guardar la paraula
        guardarParaulaPerEquip();
        return true;
    }

    function mostrarMissatgeAcertat() {
        const overlay = document.getElementById('overlay');
        overlay.className = 'active acertado';
        document.getElementById('mensaje-acertado').style.display = 'block';
        document.getElementById('mensaje-fallado').style.display = 'none';

        // So de paraula/frase encertada
        playSound(correctWordSound);

        var duration = 3 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 2500 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        (function frame() {
            confetti(Object.assign({}, defaults, { particleCount: 5, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount: 5, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));

            if (Date.now() < animationEnd) {
                requestAnimationFrame(frame);
            }
        })();
    }

    function mostrarMissatgeFallat() {
        const overlay = document.getElementById('overlay');
        overlay.className = 'active fallado';
        document.getElementById('mensaje-acertado').style.display = 'none';
        document.getElementById('mensaje-fallado').style.display = 'block';
        document.getElementById('correcta-text').textContent = "La paraula correcta era: " + fraseLogica;

        // So de paraula/frase fallada
        playSound(wrongWordSound);
    }

    function revelarFrase() {
        const caselles = document.querySelectorAll('.letter-box');
        caselles.forEach(c => {
            if (c.dataset.lletra) {
                c.classList.remove('hidden');
                c.classList.add('visible');
                c.innerText = c.dataset.lletra;
                
                // Guardar totes les lletres com a revelades
                if (!lletresRevelades.includes(c.dataset.lletra)) {
                    lletresRevelades.push(c.dataset.lletra);
                }
            }
        });
        // Guardar l'estat complet
        sessionStorage.setItem(jocKey, JSON.stringify(lletresRevelades));
    }

    // Nueva función para intentar frase completa
    function intentarFrase() {
        const inputFrase = document.getElementById('input-frase');
        let fraseIntroduida = inputFrase.value.trim().toUpperCase();

        if (!fraseIntroduida) {
            mostrarErrorTemporalFrase("Introduïu una frase o paraula per intentar!");
            inputFrase.focus();
            return;
        }

        const puntsActuals = obtenirPunts();
        if (puntsActuals < 200) {
            mostrarErrorTemporalFrase("No tens prou punts! (Cost: 200)");
            return;
        }

        // Restar 200 punts per intentar endevinar la frase completa
        establirPunts(puntsActuals - 200);

        if (fraseIntroduida === fraseLogica) {
            guardarParaulaPerEquip();
            mostrarMissatgeAcertat();
        } else {
            // Penalització: resetejar punts a 0 per fallar la frase
            establirPunts(0);
            revelarFrase();
            setTimeout(() => {
                mostrarMissatgeFallat();
            }, 3000);
        }

        inputFrase.value = "";
        inputFrase.focus();
    }

    // Funció per mostrar la pista
    function mostrarPista() {
        if (pistaMostrada) {
            mostrarErrorTemporalFrase("Ja has utilitzat la pista!");
            return;
        }

        if (!pista || pista === '') {
            mostrarErrorTemporalFrase("No hi ha pista disponible per aquesta paraula.");
            return;
        }

        const puntsActuals = obtenirPunts();
        if (puntsActuals < 100) {
            mostrarErrorTemporalFrase("No tens prou punts! (Cost: 100)");
            return;
        }

        // Restar 100 punts per la pista
        establirPunts(puntsActuals - 100);

        // Mostrar la pista
        const pistaContainer = document.getElementById('pista-container');
        const pistaText = document.getElementById('pista-text');
        pistaText.textContent = '💡 ' + pista;
        pistaContainer.classList.add('visible');
        pistaMostrada = true;

        // Desactivar el botó de pista
        document.getElementById('btn-pista').disabled = true;
    }

    function toggleMenu() {
        const menu = document.getElementById('dropdownMenu');
        menu.classList.toggle('active');
    }

    // Cerrar menú si se hace click fuera de él
    document.addEventListener('click', function(event) {
        const menu = document.getElementById('dropdownMenu');
        const btn = document.querySelector('.hamburger-btn');
        if (!menu.contains(event.target) && !btn.contains(event.target)) {
            menu.classList.remove('active');
        }
    });

    // Comprovar si hi ha equips afegits en carregar
    function checkEquips(){
        const equips = JSON.parse(localStorage.getItem('equips')) || [];
        if(equips.length === 0){
            document.getElementById('overlay-recordatorio-equip').classList.add('actiu');
        }
    }
    
    // Executar comprovació en carregar
    checkEquips();

    function irAPalabrasDesdeMenu(event) {
        event.preventDefault();
        const equips = JSON.parse(localStorage.getItem('equips')) || [];
        if(equips.length === 0){
            document.getElementById('overlay-recordatorio-equip').classList.add('actiu');
            return;
        }
        sessionStorage.setItem('mostrarRecordatorio', 'true');
        window.location.href = 'Palabras.html';
    }

    function irAGameDesdeMenu(event){
        event.preventDefault();
        // Ja estem a Game.html, no cal redirigir
    }

    function irARuletaDesdeMenu(event){
        event.preventDefault();
        const equips = JSON.parse(localStorage.getItem('equips')) || [];
        if(equips.length === 0){
            document.getElementById('overlay-recordatorio-equip').classList.add('actiu');
            return;
        }
        sessionStorage.setItem('mostrarRecordatorioRuleta','true');
        window.location.href='Ruleta.html';
    }
</script>
