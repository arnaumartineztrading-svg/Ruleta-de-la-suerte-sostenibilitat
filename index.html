<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8" />
    <title>Pàgina Principal - Gestió i Estratègia Interna</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f5e9;
            margin: 0; padding: 20px;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 40px;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
        }
        .cuadro {
            background: white;
            border: 4px solid #2e7d32;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
            color: #2e7d32;
            height: 150px;
            user-select: none;
            box-shadow: 3px 3px 5px #a5d6a7;
            transition: background-color 0.3s ease, color 0.3s ease;
            text-align: center;
            padding: 10px;
        }
        .cuadro:hover {
            background-color: #a5d6a7;
            color: white;
        }
        
        .cuadro-normes {
            grid-column: 1 / -1;
            background: white;
            border: 4px solid #2e7d32;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 700;
            color: #2e7d32;
            height: 100px;
            user-select: none;
            box-shadow: 3px 3px 5px #a5d6a7;
            transition: background-color 0.3s ease, color 0.3s ease;
            text-align: center;
            padding: 10px;
        }
        .cuadro-normes:hover {
            background-color: #a5d6a7;
            color: white;
        }
    </style>
</head>
<body>

<h1>GESTIÓ I ESTRATÈGIA INTERNA</h1>

<div class="grid">
    <div class="cuadro" onclick="irAPalabras()">PARAULES</div>
    <div class="cuadro" onclick="window.location.href='Game.html'">JOC</div>
    <div class="cuadro" onclick="irARuleta()">RULETA</div>
    <div class="cuadro" onclick="window.location.href='Clasificacion.html'">CLASSIFICACIÓ</div>
    <div class="cuadro-normes" onclick="window.location.href='Normas.html'">📜 NORMES</div>
</div>

<script>
    function navegar(pagina){
        if(pagina) window.location.href = pagina;
    }

    function irAPalabras() {
        sessionStorage.setItem('mostrarRecordatorio', 'true');
        window.location.href = 'Palabras.html';
    }
    function irARuleta(){
        sessionStorage.setItem('mostrarRecordatorioRuleta','true');
        window.location.href = 'Ruleta.html';
    }
</script>

</body>
</html>
