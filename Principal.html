<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Ruleta de la suerte - Sostenibilitat</title>
    <style>
        body {
            margin: 0;
            background: #e8f5e9;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            color: #333;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 30px;
        }

        /* Rectángulo de NORMAS arriba */
        .normas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .normas-card {
            background: white;
            border: 3px solid #2e7d32;
            border-radius: 12px;
            padding: 25px 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            min-width: 300px;
        }

        .normas-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #e8f5e9;
        }

        .normas-card h2 {
            color: #2e7d32;
            margin: 10px 0 5px 0;
            font-size: 1.5rem;
        }

        .normas-card p {
            color: #666;
            margin: 0;
        }

        /* Grid de 4 cuadrados debajo */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            .normas-card { min-width: unset; padding: 20px; }
            h1 { font-size: 1.4rem; }
        }

        .menu-card {
            background: white;
            border: 3px solid #2e7d32;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            background: #e8f5e9;
        }

        .menu-card h2 {
            color: #2e7d32;
            margin: 10px 0 5px 0;
            font-size: 1.3rem;
        }

        .menu-card p {
            color: #666;
            margin: 0;
            font-size: 0.9rem;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Ruleta de la suerte - Sostenibilitat</h1>

    <!-- Rectángulo de NORMAS arriba -->
    <div class="normas-container">
        <a href="Normas.html" style="text-decoration: none;">
            <div class="normas-card">
                <div class="icon">📋</div>
                <h2>NORMES</h2>
                <p>Regles del joc</p>
            </div>
        </a>
    </div>

    <!-- 4 cuadrados debajo -->
    <div class="menu-grid">
        <a href="Clasificacion.html" style="text-decoration: none;">
            <div class="menu-card">
                <div class="icon">🏆</div>
                <h2>CLASSIFICACIÓ</h2>
                <p>Gestiona els equips i puntuacions</p>
            </div>
        </a>

        <a href="Palabras.html" style="text-decoration: none;">
            <div class="menu-card">
                <div class="icon">🔤</div>
                <h2>PARAULES</h2>
                <p>Llista de paraules per endevinar</p>
            </div>
        </a>

        <a href="Ruleta.html" style="text-decoration: none;">
            <div class="menu-card">
                <div class="icon">🎡</div>
                <h2>RULETA</h2>
                <p>Gira la ruleta y gana puntos</p>
            </div>
        </a>

        <a href="Game.html" style="text-decoration: none;">
            <div class="menu-card">
                <div class="icon">🎮</div>
                <h2>JOC</h2>
                <p>Última paraula</p>
            </div>
        </a>
    </div>
</body>
</html>
